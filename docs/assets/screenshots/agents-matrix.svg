<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">SotuRail agent matrix screenshot</title>
  <desc id="desc">Illustrative host compatibility matrix with stable, legacy and experimental rows.</desc>
  <rect width="960" height="520" fill="#f8fafc"/>
  <text x="48" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Agent Host Compatibility Matrix</text>
  <rect x="48" y="100" width="864" height="336" rx="8" fill="#ffffff" stroke="#d7dee8"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#172033">
    <text x="72" y="142" font-weight="700">Host</text>
    <text x="284" y="142" font-weight="700">Status</text>
    <text x="468" y="142" font-weight="700">MCP</text>
    <text x="650" y="142" font-weight="700">Command</text>
    <line x1="72" y1="160" x2="880" y2="160" stroke="#d7dee8"/>
    <text x="72" y="198">Codex</text>
    <text x="284" y="198" fill="#15803d">stable</text>
    <text x="468" y="198">prompt-only</text>
    <text x="650" y="198" font-family="Consolas, monospace" font-size="15">agents export --agent codex</text>
    <text x="72" y="244">OpenCode</text>
    <text x="284" y="244" fill="#0369a1">generic-compatible</text>
    <text x="468" y="244">planned</text>
    <text x="650" y="244" font-family="Consolas, monospace" font-size="15">agents export --agent opencode</text>
    <text x="72" y="290">Antigravity</text>
    <text x="284" y="290" fill="#b45309">experimental</text>
    <text x="468" y="290">planned</text>
    <text x="650" y="290" font-family="Consolas, monospace" font-size="15">agents doctor --host antigravity</text>
    <text x="72" y="336">Gemini Legacy</text>
    <text x="284" y="336" fill="#6d28d9">legacy</text>
    <text x="468" y="336">planned</text>
    <text x="650" y="336" font-family="Consolas, monospace" font-size="15">agents export --agent gemini-legacy</text>
    <text x="72" y="382">DeepAgents</text>
    <text x="284" y="382" fill="#b45309">experimental</text>
    <text x="468" y="382">docs-only</text>
    <text x="650" y="382" font-family="Consolas, monospace" font-size="15">agents export --agent deepagents</text>
  </g>
  <text x="48" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">All rows keep mutationAllowedByDefault=false.</text>
</svg>
