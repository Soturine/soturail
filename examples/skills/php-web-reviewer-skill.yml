id: php-web-reviewer
name: PHP Web Reviewer
description: Review PHP web changes for routing, validation, database safety and deployment risk.
version: 0.1.0
author: Rafael Ryan Ramos de Souza
risk_level: medium
targets:
  - claude
  - codex
  - gemini
  - cursor
