id: code-review
name: Code Review
description: Review code changes for correctness, safety, regression risk and missing tests.
version: 0.1.0
author: Rafael Ryan Ramos de Souza
risk_level: low
targets:
  - claude
  - codex
  - gemini
  - cursor
  - generic
allowed_tools:
  - read
  - search
  - summarize
  - format
forbidden_patterns:
  - rm -rf
  - curl | sh
  - git push
  - secret exfiltration
requires_human_approval:
  - destructive_command
  - remote_write
  - dependency_install
